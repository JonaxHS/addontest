<svg xmlns="http://www.w3.org/2000/svg" width="400" height="80" viewBox="0 0 400 80" role="img" aria-label="DebridStream logo">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#ff2d5c"/>
      <stop offset="100%" stop-color="#ff7a3d"/>
    </linearGradient>
  </defs>
  <!-- Play icon -->
  <g transform="translate(10,8)">
    <rect rx="12" ry="12" width="64" height="64" fill="url(#g)"/>
    <polygon points="26,20 50,32 26,44" fill="#fff"/>
  </g>

  <!-- Text -->
  <g transform="translate(96,52)">
    <text x="0" y="-6" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111">DEBRID</text>
    <text x="74" y="-6" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#9aa7c2">STREAM</text>
  </g>
</svg>
